# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["TheKinks"] # Make sure this is the branch you push your code to (e.g., 'main' or 'master')

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # --- NEW: Change directory to your frontend subfolder ---
      - name: Change to frontend directory
        run: cd frontend
        # This will make subsequent commands run from the 'frontend' directory
        # You can also use 'working-directory: frontend' in each step if you prefer,
        # but 'cd' at the start is often simpler for a sequence of commands.
      
      - name: Detect package manager
        id: detect-package-manager
        run: |
          # The paths here should be relative to the 'frontend' directory now
          if [ -f "yarn.lock" ]; then # Removed ${{ github.workspace }}
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "package.json" ]; then # Removed ${{ github.workspace }}
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          # --- NEW: Specify cache path for frontend's node_modules ---
          cache-dependency-path: frontend/package-lock.json # Or frontend/yarn.lock

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          # --- IMPORTANT: Ensure your next.config.js is correctly configured ---
          # Make sure frontend/next.config.js has:
          # output: 'export',
          # basePath: '/shredsite.github.io', (or whatever your repo name is for the project page)
          # assetPrefix: '/shredsite.github.io/',
          # images: { unoptimized: true },
          # This action will handle injecting the basePath if 'static_site_generator: next' is used,
          # but having it explicit in next.config.js is good practice.

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            # --- NEW: Point cache to frontend's .next cache ---
            frontend/.next/cache
          # Generate a new cache whenever packages or source files change.
          # --- NEW: Hash files relative to frontend directory ---
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json', 'frontend/yarn.lock') }}-${{ hashFiles('frontend/**.[jt]s', 'frontend/**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json', 'frontend/yarn.lock') }}-

      - name: Install dependencies
        # --- NEW: Add working-directory to run command in frontend folder ---
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
        working-directory: ./frontend
        
      - name: Build with Next.js
        # --- NEW: Add working-directory to run command in frontend folder ---
        run: ${{ steps.detect-package-manager.outputs.runner }} next build
        working-directory: ./frontend
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # --- NEW: Point path to the frontend's 'out' directory ---
          path: ./frontend/out # This is crucial!

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
