# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["TheKinks"] # Make sure this is the branch you push your code to (e.g., 'main' or 'master')

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # REMOVE THIS BLOCK - we'll use working-directory on individual steps instead
      # - name: Set working directory to frontend
      #   run: |
      #     echo "CURRENT_WORKING_DIRECTORY=frontend" >> $GITHUB_ENV

      - name: Detect package manager
        id: detect-package-manager
        # --- CRITICAL CHANGE: Run this step directly in the frontend directory ---
        working-directory: ./frontend 
        run: |
          # Now, these paths are correctly relative to 'frontend/'
          if [ -f "yarn.lock" ]; then # No "frontend/" prefix needed here
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "package.json" ]; then # No "frontend/" prefix needed here
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          # --- Point cache to frontend's lock file (relative to repo root) ---
          cache-dependency-path: frontend/package-lock.json # Or frontend/yarn.lock

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            # --- Point cache to frontend's .next cache (relative to repo root) ---
            frontend/.next/cache
          # Hash files relative to frontend directory (relative to repo root)
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json', 'frontend/yarn.lock') }}-${{ hashFiles('frontend/**.[jt]s', 'frontend/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json', 'frontend/yarn.lock') }}-

      - name: Install dependencies
        # --- Run install inside the frontend directory ---
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
        working-directory: ./frontend
        
      - name: Build with Next.js
        # --- Run build inside the frontend directory ---
        run: ${{ steps.detect-package-manager.outputs.runner }} next build
        working-directory: ./frontend
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # --- CRUCIAL: Point to the 'out' folder inside 'frontend' (relative to repo root) ---
          path: ./frontend/out